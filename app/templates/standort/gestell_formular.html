{% extends 'base.html' %}
{% block title %}{{ 'Gestell bearbeiten' if gestell else 'Neues Gestell' }}{% endblock %}
{% block content %}
<h1>{{ 'Gestell bearbeiten' if gestell else 'Neues Gestell' }}</h1>

<form method="post" class="mt-3" style="max-width:500px">
  <div class="mb-3">
    <label class="form-label">Raum *</label>
    <select name="raum_id" class="form-select" required>
      <option value="">– Raum wählen –</option>
      {% for raum in raeume %}
      <option value="{{ raum.id }}"
        {{ 'selected' if gestell and gestell.raum_id == raum.id }}>
        {{ raum.zone.name }} / {{ raum.name }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Name *</label>
    <input type="text" name="name" class="form-control" required
           value="{{ gestell.name if gestell else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Typ</label>
    <input type="text" name="typ" class="form-control" placeholder="z.B. Metallregal, Schrank"
           value="{{ gestell.typ if gestell else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Beschreibung</label>
    <textarea name="beschreibung" class="form-control" rows="2">{{ gestell.beschreibung if gestell else '' }}</textarea>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Speichern</button>
    <a href="{{ url_for('standort.gestell_liste') }}" class="btn btn-outline-secondary">Abbrechen</a>
  </div>
</form>
{% endblock %}
