{% extends 'base.html' %}
{% block title %}{{ 'Tag bearbeiten' if tag else 'Neuer Tag' }}{% endblock %}
{% block content %}
<h1>{{ 'Tag bearbeiten' if tag else 'Neuer Tag' }}</h1>

<form method="post" class="mt-3" style="max-width:400px">
  <div class="mb-3">
    <label class="form-label">Name *</label>
    <input type="text" name="name" class="form-control" required
           value="{{ tag.name if tag else '' }}">
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Speichern</button>
    <a href="{{ url_for('stammdaten.tag_liste') }}" class="btn btn-outline-secondary">Abbrechen</a>
  </div>
</form>
{% endblock %}
