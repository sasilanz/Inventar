{% extends 'base.html' %}
{% block title %}{{ 'Regalfach bearbeiten' if fach else 'Neues Regalfach' }}{% endblock %}
{% block content %}
<h1>{{ 'Regalfach bearbeiten' if fach else 'Neues Regalfach' }}</h1>

<form method="post" class="mt-3" style="max-width:500px">
  <div class="mb-3">
    <label class="form-label">Gestell *</label>
    <select name="gestell_id" class="form-select" required>
      <option value="">– Gestell wählen –</option>
      {% for gestell in gestelle %}
      <option value="{{ gestell.id }}"
        {{ 'selected' if fach and fach.gestell_id == gestell.id }}>
        {{ gestell.raum.zone.name }} / {{ gestell.raum.name }} / {{ gestell.name }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Bezeichnung *</label>
    <input type="text" name="bezeichnung" class="form-control" required
           placeholder="z.B. Fach A, Boden 3"
           value="{{ fach.bezeichnung if fach else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Position (für Sortierung)</label>
    <input type="number" name="position_index" class="form-control"
           value="{{ fach.position_index if fach else 0 }}">
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Speichern</button>
    <a href="{{ url_for('standort.regalfach_liste') }}" class="btn btn-outline-secondary">Abbrechen</a>
  </div>
</form>
{% endblock %}
