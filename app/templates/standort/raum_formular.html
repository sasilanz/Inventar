{% extends 'base.html' %}
{% block title %}{{ 'Raum bearbeiten' if raum else 'Neuer Raum' }}{% endblock %}
{% block content %}
<h1>{{ 'Raum bearbeiten' if raum else 'Neuer Raum' }}</h1>

<form method="post" class="mt-3" style="max-width:500px">
  {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
  <div class="mb-3">
    <label class="form-label">Zone *</label>
    <select name="zone_id" class="form-select" required>
      <option value="">– Zone wählen –</option>
      {% for zone in zonen %}
      <option value="{{ zone.id }}"
        {{ 'selected' if (raum and raum.zone_id == zone.id) or (not raum and prefill_zone_id == zone.id) }}>
        {{ zone.name }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Name *</label>
    <input type="text" name="name" class="form-control" required
           value="{{ raum.name if raum else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Beschreibung</label>
    <textarea name="beschreibung" class="form-control" rows="2">{{ raum.beschreibung if raum else '' }}</textarea>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Speichern</button>
    <a href="{{ next_url or url_for('standort.raum_liste') }}" class="btn btn-outline-secondary">Abbrechen</a>
  </div>
</form>
{% endblock %}
