{% extends 'base.html' %}
{% block title %}{{ 'Zone bearbeiten' if zone else 'Neue Zone' }}{% endblock %}
{% block content %}
<h1>{{ 'Zone bearbeiten' if zone else 'Neue Zone' }}</h1>

<form method="post" class="mt-3" style="max-width:500px">
  <div class="mb-3">
    <label class="form-label">Name *</label>
    <input type="text" name="name" class="form-control" required
           value="{{ zone.name if zone else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Beschreibung</label>
    <textarea name="beschreibung" class="form-control" rows="2">{{ zone.beschreibung if zone else '' }}</textarea>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Speichern</button>
    <a href="{{ url_for('standort.zone_liste') }}" class="btn btn-outline-secondary">Abbrechen</a>
  </div>
</form>
{% endblock %}
